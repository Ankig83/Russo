name: Deploy to Beget VPS

on:
  push:
    branches: [beget]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Upload dist to VPS
        env:
          BEGET_HOST: ${{ secrets.BEGET_HOST }}
          BEGET_USER: ${{ secrets.BEGET_USER }}
          BEGET_PASSWORD: ${{ secrets.BEGET_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "$BEGET_PASSWORD" rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            dist/ "${BEGET_USER}@${BEGET_HOST}:/var/www/russo/"

      - name: Fix permissions on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.BEGET_HOST }}
          username: ${{ secrets.BEGET_USER }}
          password: ${{ secrets.BEGET_PASSWORD }}
          port: 22
          script: |
            chown -R www-data:www-data /var/www/russo
            rm -f /var/www/russo/models/shkaf_full.glb
